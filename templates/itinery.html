{% extends "base.html" %}

{% block title %}Travel Itinerary - Dynamic City Explorer{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-gradient py-3">
                    <h3 class="card-title mb-0 text-center">
                        <i class="fas fa-route me-2"></i>
                        Your Travel Itinerary
                    </h3>
                </div>
                <div class="card-body p-4">
                    <div class="text-center">
                        <i class="fas fa-map-marked-alt fa-5x text-info mb-3"></i>
                        <h4>Itinerary Generated Successfully!</h4>
                        <p class="text-muted">Your AI-powered travel plan is ready.</p>
                        <a href="{{ url_for('index') }}" class="btn btn-info">
                            <i class="fas fa-arrow-left me-2"></i>
                            Plan Another Trip
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
